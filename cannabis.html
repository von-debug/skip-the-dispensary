<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cannabis Products</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .product { border: 1px solid #ccc; padding: 16px; margin: 16px; display: inline-block; width: calc(33% - 64px); }
        .product img { max-width: 100%; height: auto; }
        .add-to-cart { background-color: green; color: white; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Cannabis Products</h1>
    <div class="product">
        <img src="https://example.com/image1.jpg" alt="Product 1">
        <h2>Product Name 1</h2>
        <p>Description of product 1.</p>
        <p>Price: $10.00</p>
        <button class="add-to-cart" onclick="addToCart('Product Name 1', 10.00)">Add to Cart</button>
    </div>
    <div class="product">
        <img src="https://example.com/image2.jpg" alt="Product 2">
        <h2>Product Name 2</h2>
        <p>Description of product 2.</p>
        <p>Price: $12.00</p>
        <button class="add-to-cart" onclick="addToCart('Product Name 2', 12.00)">Add to Cart</button>
    </div>
    <div class="product">
        <img src="https://example.com/image3.jpg" alt="Product 3">
        <h2>Product Name 3</h2>
        <p>Description of product 3.</p>
        <p>Price: $15.00</p>
        <button class="add-to-cart" onclick="addToCart('Product Name 3', 15.00)">Add to Cart</button>
    </div>
    <script>
        function addToCart(productName, price) {
            alert(productName + ' has been added to your cart for $' + price);
        }
    </script>
</body>
</html>
