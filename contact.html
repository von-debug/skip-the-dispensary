<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="/submit-form" method="POST">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" required></textarea><br><br>
        <input type="submit" value="Submit">
    </form>
    <h2>Payment Information</h2>
    <p>Please make payments to the following account:</p>
    <p>Account Holder: Skip The Dispensary<br>
    Bank: Your Bank Name<br>
    Account Number: 123456789<br>
    Sort Code: 00-00-00</p>
    <p>Email us at: <a href="mailto:skipthedispensary@outlook.com">skipthedispensary@outlook.com</a> for inquiries and orders.</p>
</body>
</html>
